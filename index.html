<!DOCTYPE html> 
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>音乐播放器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      background: linear-gradient(180deg, #f5e6d3, #d4c4b5);
      color: #4a3f35;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .music-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 95%;
      max-width: 500px;
      margin: 15px auto;
      background: rgba(255,250,245,0.9);
      border-radius: 30px;
      padding: 15px 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      text-align: center;
    }
    .music-title { font-size: 1.1rem; font-weight: 600; color: #5e4b3c; }
    .music-subtitle { font-size: 0.8rem; color: #8b7a68; margin-bottom: 10px; }
    .status-text {
      font-size: 0.9rem;
      color: #6b5d4f;
      background: rgba(240,230,218,0.7);
      border-radius: 20px;
      padding: 6px 16px;
      display: inline-block;
      margin: 8px 0;
    }
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      background: rgba(255,251,245,0.9);
      border: 1px solid rgba(200,180,160,0.5);
      padding: 12px 20px;
      border-radius: 25px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #4a3f35;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.95); background: #e7d7c4; }
    .btn.play-btn { background: #e7d7c4; font-weight: 600; }
    .article {
      width: 95%;
      max-width: 500px;
      margin: 15px auto 40px;
      background: rgba(255,252,248,0.8);
      border-radius: 25px;
      padding: 30px 25px;
      line-height: 2;
    }
    .article h1 { text-align: center; font-size: 1.5rem; color: #5e4b3c; margin-bottom: 10px; }
    .article h2 { font-size: 1.1rem; color: #6b5a48; margin: 20px 0 10px; border-left: 3px solid #c8b6a6; padding-left: 10px; }
    .article p { text-indent: 2em; margin-bottom: 10px; font-size: 0.95rem; }
    .divider { text-align: center; color: #c8b6a6; margin: 20px 0; letter-spacing: 5px; }
  </style>
</head>
<body>

  <div class="music-bar">
    <div class="music-title">🎵 晨光旋律</div>
    <div class="music-subtitle">轻音乐陪伴阅读</div>
    <div class="status-text" id="statusText">点击下方按钮播放</div>
    <div class="btn-group">
      <button class="btn play-btn" id="playBtn">▶ 播放</button>
      <button class="btn" id="pauseBtn">⏸ 暂停</button>
      <button class="btn" id="nextBtn">⏭ 下一首</button>
    </div>
  </div>

  <div class="article">
    <h1>🍂 时光深处的旋律</h1>
    <p class="divider">—— · ✿ · ——</p>
    <p>在每一个清晨的微光里，总有一段旋律悄然响起。它不疾不徐，像山间流淌的溪水，穿过石缝，绕过青苔，带着林间特有的湿润与清凉，缓缓注入心田。</p>
    <p>有时候，我会想，人为什么要听音乐？是为了排遣孤独，还是为了寻找共鸣？或许两者都有。</p>
    <h2>✨ 记忆里的八音盒</h2>
    <p>小时候，外婆家有一个老旧的八音盒。木质的外壳已经磨损，但发条一拧，清脆的旋律就会叮叮咚咚地流淌出来。</p>
    <h2>🌙 夜与钢琴</h2>
    <p>深夜，是我与钢琴曲独处的时间。白天的喧嚣退去，世界仿佛只剩下我和耳机里流淌的音符。</p>
    <p class="divider">—— · ✿ · ——</p>
    <p style="text-align:center; color:#8b7a68;">🎶 再见狗哥🎶</p>
  </div>

  <script>
 const PLAYLIST = [
    "https://cdn.jsdelivr.net/gh/jiangshaoyu1016/music@main/juebieshu.mp3",
    "https://cdn.jsdelivr.net/gh/jiangshaoyu1016/music@main/likai.mp3",
    "https://cdn.jsdelivr.net/gh/jiangshaoyu1016/music@main/shuei.mp3",
    "https://cdn.jsdelivr.net/gh/jiangshaoyu1016/music@main/colelams.mp3",
    "https://cdn.jsdelivr.net/gh/jiangshaoyu1016/music@main/yitian.mp3"
];
    
    let currentIndex = 0;
    let audio = null;
    
    const statusText = document.getElementById('statusText');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    function updateStatus(msg) {
      statusText.textContent = msg;
    }
    
    function createAudio() {
      if (audio) {
        audio.pause();
        audio = null;
      }
      audio = new Audio(PLAYLIST[currentIndex]);
      audio.volume = 0.5;
      
      audio.addEventListener('play', () => updateStatus(`正在播放 · 第${currentIndex+1}首`));
      audio.addEventListener('pause', () => updateStatus('已暂停'));
      audio.addEventListener('ended', () => {
        updateStatus('播放完毕');
        currentIndex = (currentIndex + 1) % PLAYLIST.length;
        createAudio();
        audio.play();
      });
      audio.addEventListener('error', () => updateStatus('加载失败，请检查文件'));
    }
    
    function play() {
      if (!audio) createAudio();
      audio.play().catch(() => updateStatus('播放失败，请再点一次'));
    }
    
    function pause() {
      if (audio) audio.pause();
    }
    
    function next() {
      currentIndex = (currentIndex + 1) % PLAYLIST.length;
      createAudio();
      play();
    }
    
    playBtn.addEventListener('click', play);
    pauseBtn.addEventListener('click', pause);
    nextBtn.addEventListener('click', next);
    
    createAudio();
    updateStatus('准备就绪 · 共4首');
  </script>
</body>
</html>
